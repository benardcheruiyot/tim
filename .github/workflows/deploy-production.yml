name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NODE_VERSION: 20
      PM2_APP_NAME: ${{ vars.PM2_APP_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install and build frontend
        run: |
          npm --prefix frontend install
          npm --prefix frontend run build

      - name: Sync files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "backend/,frontend/build/"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true
          strip_components: 0

      - name: Install backend deps and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e

            APP_ROOT="${{ secrets.DEPLOY_PATH }}"
            BACKEND_DIR="$APP_ROOT/backend"
            APP_NAME="${PM2_APP_NAME:-extracash-backend}"

            cat > "$BACKEND_DIR/.env" <<'EOF'
            ${{ secrets.BACKEND_ENV }}
            EOF

            cd "$BACKEND_DIR"
            npm ci --omit=dev

            if pm2 list | grep -q "$APP_NAME"; then
              pm2 reload "$APP_NAME" --update-env
            else
              pm2 start src/server.js --name "$APP_NAME"
            fi

            pm2 save

            if ! curl -fsS http://127.0.0.1:5000/api/health >/dev/null; then
              echo "Backend health check failed after deployment"
              pm2 status
              pm2 logs "$APP_NAME" --lines 80 --nostream || true
              exit 1
            fi
